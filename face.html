<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login-DISNAI</title>
    <link rel="icon" type="image/png" href="imagens-logo.png">
    <link rel="stylesheet" href="css/face.css">
<script defer src="https//cdn.jsdelivr.net/npm/face-api.js"></script>
</head>
<body class="body-face">

    <mein class="pagina-face">
        <section class="face-container">

            <img src="imagens/logo.png" alt="DISNAI" class="logo-face">
            <h1>login com reconhecimento facil</h1>
            <p class="face-texto">
                posicione seu rosto dentro da moldura para cadastrar ou acessar sua conta com segurança
            </p>
            <div class="camera-box">
                <video id="videoface" autoplay muted playsinline></video>
                <canvas id="canvasface"></canvas>
                <div class="moldura-rosto"></div>
            </div>
            <div id="statusface" class="statusface"> 
                aguardando a ação.
            </div>

            <div class="botoes-face">
                <button id="btnINICIARCAMERA" class="btn-face btn-primary">
                    📷 INICIAR CAMERA
                </button>
                <button id="btnCadastrarface" class="btn-face btn-sucess" style="display:none;">
                    ✓ CADASTRAR ROSTO
                </button>
                <button id="btnEntrarface" class="btn-face btn-sucess" style="display:none;">
                    🔓 ENTRAR COM ROSTO
                </button>
            </div>
            <div class="term-face" id="termosfacewrap" style="display:none;">
                <label>
                    <input type="checkbox" id="aceitotermosface"/>
                    ESTOU DE ACORDO COM O ARMAZENAMENTO DE DADOS BIOMETRICOS ( RECONHECIMENTO FACIAL) E POLITICA DE PRIVACIDADE.
                </label>
            </div>

            <a href="login-html" class="voltar-login">
                VOLTAR PARA O LOGIN
            </a>

        </section>
    </mein>

    <script type="module" src="js/face-auth.js"></script>

    
</body>
</html>
