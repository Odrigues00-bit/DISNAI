<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHATBOT</title>
    <link rel="stylesheet" href="estilo.css">

</head>
<body>
    <div class="CHATBOT-WIDGET" id="CHATBOT-WIDGET">
        <button 
        id="CHATBOT-TOGGLE";
        class="CHATBOT-TOGGLE";
        aria-label="abrir chat com DISNAI">💬
        </button>
    <div class="CHATBOT-WINDOW" id="CHATBOT-WIDGET">
    <header class="CHATBOT-HEADER">
        <div class="CHATBOT-HEADER-info">
            <div class="CHATBOT-avatar">😁</div>
            <div>
                <div class="chatbot-title">DISNAI</div>
                <div class="chatbot-subtitle">assistente de video</div>
            </div>
            <button class="chatbot-close" aria-label="fechar chat">
                ✖️
            </button>
        </header>
        <div class="chatbot-messages" id="chatbot-messages">

    </div>

    <form class="chatbot-form" id="chatbot-form">
        <input
        type="text";
        id="chatbot-input";
        class="chatbot-input";
        placeholder="digite sua pergunta...";
        autocomplete="on";
        required
        >
        <button types="submit" class="chatbot-send-btn">✓</button>
    </form>
   </div>
</div>

<div vw class="enabled">
    <div vw-acess-button-class="active"></div>
    <div vw-plugin-wrapper>
    <div class="vw-top-wrapper"></div>
    </div>
</div>
<script src="script"></script>
</body>
</html>
